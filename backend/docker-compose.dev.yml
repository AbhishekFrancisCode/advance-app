services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "50051:50051"
    volumes:
      - .:/app
    depends_on:
      - postgres
    stop_grace_period: 30s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "50052:50052"
    volumes:
      - .:/app
    depends_on:
      - postgres

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile.dev
    container_name: notification-service
    ports:
      - "50053:50053"
    volumes:
      - .:/app
    env_file:
      - services/notification-service/.env
    depends_on:
      - kafka

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7
    ports:
      - "6379:6379"
  api-gateway-1:
    build:
     context: ./services/api-gateway
    hostname: api-gateway-1
    container_name: api-gateway-1
    depends_on:
      - redis

  api-gateway-2:
    build:
      context: ./services/api-gateway
    hostname: api-gateway-2
    container_name: api-gateway-2
    depends_on:
      - redis

  api-gateway-3:
    build:
      context: ./services/api-gateway
    hostname: api-gateway-3
    container_name: api-gateway-3
    depends_on:
      - redis
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - api-gateway-3
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
