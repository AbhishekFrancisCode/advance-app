syntax = "proto3";

package auth;

import "google/protobuf/empty.proto";

option go_package = "api-gateway/proto/auth;auth";

service AuthService {
  rpc Register (RegisterRequest) returns (AuthResponse);
  rpc Login (LoginRequest) returns (AuthResponse);
  rpc RefreshToken (RefreshRequest) returns (RefreshResponse);
  rpc Logout (LogoutRequest) returns (MessageResponse);
  rpc GetSessions (GetSessionsRequest) returns (SessionsResponse);
  rpc LogoutSession (LogoutSessionRequest) returns (MessageResponse);
  rpc LogoutAllSessions (LogoutAllRequest) returns (MessageResponse);
  
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
}

message HealthResponse {
  string status = 1;
}

message RegisterRequest {
  string email    = 1;
  string password = 2;
  string name     = 3;
  string phone    = 4;

  string userAgent = 5;
  string ipAddress = 6;
}

message LoginRequest {
  string email    = 1;
  string password = 2;

  string userAgent = 5;
  string ipAddress = 6;
}

message LogoutRequest {
  string userId = 1;
}

message AuthResponse {
  string message      = 1;
  string accessToken  = 2;
  string refreshToken = 3;
}

//Refresh tokens
message RefreshRequest {
  string refreshToken = 1;
}

message RefreshResponse {
  string message      = 1;
  string accessToken  = 2;
  string refreshToken = 3;
}

message MessageResponse {
  string message = 1;
}

//Sessions
message GetSessionsRequest {
  string userId = 1;
}

message Session {
  string id         = 1;
  string device     = 2;
  string ipAddress  = 3;
  string createdAt  = 4;
  string userAgent  = 5;
  string lastUsedAt = 6;

}

message SessionsResponse {
  repeated Session sessions = 1;
}

message LogoutSessionRequest {
  string sessionId = 1;
}

message LogoutAllRequest {
  string userId = 1;
}