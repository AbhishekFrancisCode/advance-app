syntax = "proto3";

package notification;
import "google/protobuf/struct.proto";

option go_package = "api-gateway/proto/notification;notification";
service NotificationService {
  rpc GetNotifications (GetNotificationsRequest) returns (GetNotificationsResponse);
  rpc GetDlqEvents (GetDlqEventsRequest) returns (GetDlqEventsResponse);
  rpc GetDlqEventById (GetDlqEventRequestById) returns (GetDlqEventResponse);
  rpc ReplayDlqEvent (ReplayDlqEventRequest) returns (ReplayDlqEventResponse);
}

message Notification {
  string id               = 1;
  string userId           = 2;
  string notificationType = 3;
  string message          = 4;
  string status           = 5;
  string createdAt        = 6;
}

message DeadLetterEvent {
  string id        = 1;
  string topic     = 2;
  google.protobuf.Struct payload = 3;
  string error     = 4;
  string createdAt = 5;
  string status    = 6;
}

message GetNotificationsRequest {
  string userId = 1;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
}

message GetDlqEventsRequest {
  string userId = 1;
}

message GetDlqEventsResponse {
  repeated DeadLetterEvent events = 1;
}

message GetDlqEventResponse {
  DeadLetterEvent event = 1;
}

message GetDlqEventRequestById {
  string id = 1;
}

message ReplayDlqEventRequest {
  string id = 1;
}

message ReplayDlqEventResponse {
  bool   success = 1;
  string message = 2;
}
