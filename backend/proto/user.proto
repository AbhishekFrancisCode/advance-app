syntax = "proto3";

package user;

service UserService {
  rpc CreateUserProfile (CreateUserRequest) returns (UserResponse);
  rpc GetUserById (GetUserRequest) returns (UserResponse);
  rpc UpdateUserProfile (UpdateUserRequest) returns (UserResponse);
}

message CreateUserRequest {
  string userId = 1;
  string name   = 2;
  string phone  = 3;
}

message GetUserRequest {
  string userId = 1;
}

message UpdateUserRequest {
  string userId = 1;
  string name   = 2;
  string phone  = 3;
}

message UserResponse {
  string userId = 1;
  string name   = 2;
  string phone  = 3;
}