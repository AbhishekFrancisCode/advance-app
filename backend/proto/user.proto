syntax = "proto3";

package user;

option go_package = "api-gateway/proto/user;user";
service UserService {
  rpc CreateUserProfile (CreateUserRequest) returns (UserResponse);
  rpc GetUserById (GetUserRequest) returns (UserResponse);
  rpc UpdateUserProfile (UpdateUserRequest) returns (UserResponse);
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserProfileResponse);
}

message CreateUserRequest {
  string userId = 1;
  string name   = 2;
  string phone  = 3;
}

message GetUserRequest {
  string userId = 1;
}

message UpdateUserRequest {
  string userId  = 1;
  string name    = 2;
  string phone   = 3;
  string avatar  = 4;
  string address = 5;
  string dob     = 6;
  string email   = 7;
}

message UserResponse {
  string message = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message UserProfileResponse {
  string name    = 1;
  string phone   = 2;
  string email   = 3;
  string avatar  = 4;
  string address = 5;
  string dob     = 6;

}
