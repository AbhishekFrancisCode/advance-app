apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: advance-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-dockerhub/api-gateway:latest
          ports:
            - containerPort: 8080

          env:
            - name: REDIS_HOST
              value: redis
            - name: AUTH_SERVICE
              value: auth-service:3001

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5